# Test

cvm-version: 0.7.5
cpus: 16
memory: 65536
gpus: 1

containers:
  - name: "inference"
    image: "vllm/vllm-openai:v0.14.1@sha256:8e67731819426f7df194e5a0dfd6649d3aa3474f80c44f75b1e8711e76f8030a"
    runtime: nvidia
    gpus: all
    ipc: host
    command: ["--model", "/models/my-model", "--port", "8001"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 30m
    restart: always

shim:
  upstream-port: 8001
  paths:
    - /v1/chat/completions
    - /v1/completions
    - /health
    - /metrics
